name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/sideband-bridge/platformio.ini') }}

      - name: Install tools
        run: pip install platformio esptool

      - name: Build ttgo-t-display-ble
        working-directory: firmware/sideband-bridge
        run: pio run -e ttgo-t-display-ble

      - name: Merge binary — ttgo-t-display-ble
        working-directory: firmware/sideband-bridge
        run: |
          BOOT_APP=$(find ~/.platformio -name "boot_app0.bin" -path "*/partitions/*" 2>/dev/null | head -1)
          esptool.py --chip esp32 merge_bin \
            --flash_mode qio \
            --flash_freq 40m \
            --flash_size 4MB \
            -o sideband-bridge-ttgo-t-display-ble.bin \
            0x1000  .pio/build/ttgo-t-display-ble/bootloader.bin \
            0x8000  .pio/build/ttgo-t-display-ble/partitions.bin \
            0xe000  "$BOOT_APP" \
            0x10000 .pio/build/ttgo-t-display-ble/firmware.bin

      - name: Stage flasher
        env:
          VERSION: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          mkdir _site
          cp -r flasher/. _site/
          cp firmware/sideband-bridge/sideband-bridge-ttgo-t-display-ble.bin _site/
          sed -i "s/__VERSION__/$VERSION/g" _site/manifest.ttgo-t-display-ble.json
          sed -i "s|__REPO__|$REPO|g" _site/index.html

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: firmware/sideband-bridge/sideband-bridge-ttgo-t-display-ble.bin
          generate_release_notes: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
