[platformio]
default_envs = ttgo-t-display-ble

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
build_flags =
  -D SIDEBAND_VERSION=\"0.1.0-dev\"

[env:esp32dev]
board = esp32dev
board_build.partitions = huge_app.csv

[env:ttgo-t-display]
board = ttgo-t1
board_build.partitions = huge_app.csv
lib_deps =
  bodmer/TFT_eSPI
build_flags =
  ${env.build_flags}
  -D SIDEBAND_HAS_TFT=1
  -D USER_SETUP_LOADED=1
  -D USER_SETUP_ID=25
  -D ST7789_DRIVER=1
  -D TFT_SDA_READ=1
  -D TFT_WIDTH=135
  -D TFT_HEIGHT=240
  -D TFT_MOSI=19
  -D TFT_SCLK=18
  -D TFT_CS=5
  -D TFT_DC=16
  -D TFT_RST=23
  -D TFT_BL=4
  -D TFT_BACKLIGHT_ON=HIGH
  -D CGRAM_OFFSET=1
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D SPI_FREQUENCY=40000000
  -D SPI_READ_FREQUENCY=6000000

# BLE KISS TNC Service (KTS) alongside Bluetooth Classic.
# Requires original ESP32 (WROOM/WROVER/T-Display V1.1 non-S3).
# CONFIG_BT_CLASSIC_ENABLED + CONFIG_BT_BLE_ENABLED causes the BT controller
# to initialise in dual (BTDM) mode so BluetoothSerial and BLEDevice share the
# hardware.  Validate heap headroom at runtime before field use — see SB-013.
[env:ttgo-t-display-ble]
board = ttgo-t1
board_build.partitions = huge_app.csv
lib_deps =
  bodmer/TFT_eSPI
build_flags =
  ${env.build_flags}
  -D SIDEBAND_HAS_TFT=1
  -D SIDEBAND_HAS_BLE=1
  -D CONFIG_BT_CLASSIC_ENABLED=1
  -D CONFIG_BT_BLE_ENABLED=1
  -D USER_SETUP_LOADED=1
  -D USER_SETUP_ID=25
  -D ST7789_DRIVER=1
  -D TFT_SDA_READ=1
  -D TFT_WIDTH=135
  -D TFT_HEIGHT=240
  -D TFT_MOSI=19
  -D TFT_SCLK=18
  -D TFT_CS=5
  -D TFT_DC=16
  -D TFT_RST=23
  -D TFT_BL=4
  -D TFT_BACKLIGHT_ON=HIGH
  -D CGRAM_OFFSET=1
  -D LOAD_GLCD=1
  -D LOAD_FONT2=1
  -D SPI_FREQUENCY=40000000
  -D SPI_READ_FREQUENCY=6000000

# BLE-only target for plain ESP32-WROOM boards without a display.
[env:esp32dev-ble]
board = esp32dev
board_build.partitions = huge_app.csv
build_flags =
  ${env.build_flags}
  -D SIDEBAND_HAS_BLE=1
  -D CONFIG_BT_CLASSIC_ENABLED=1
  -D CONFIG_BT_BLE_ENABLED=1
